<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Premium Calculator</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
        }

        h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
            color: #0f766e;
        }

        h2, h3 {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon {
            width: 1.1em;
            height: 1.1em;
            flex: 0 0 auto;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .box {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .insurance-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .option {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background: #fff;
            transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
        }

        .option:hover {
            border-color: #99f6e4;
            transform: translateY(-1px);
        }

        .option.selected {
            border-color: #0f766e;
            background: #ecfdf5;
        }

        .option .option-icon {
            width: 36px;
            height: 36px;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 8px;
            color: #0f766e;
            background: #ccfbf1;
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #bbb;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            padding: 12px 18px;
            border: 0;
            border-radius: 6px;
            background: #0f766e;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #115e59;
        }

        .result {
            line-height: 1.8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #e5e7eb;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<svg width="0" height="0" style="position: absolute; overflow: hidden;" aria-hidden="true" focusable="false">
    <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"></path>
    </symbol>
    <symbol id="icon-heart-pulse" viewBox="0 0 24 24">
        <path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 0 1 7.1-7.1l.4.4.4-.4a5 5 0 0 1 7.1 7.1Z"></path>
        <path d="M3 12h4l2-4 3 8 2-4h7"></path>
    </symbol>
    <symbol id="icon-car" viewBox="0 0 24 24">
        <path d="M5 17h14"></path>
        <path d="M6 17v3"></path>
        <path d="M18 17v3"></path>
        <path d="M5 17l1.7-6.1A3 3 0 0 1 9.6 9h4.8a3 3 0 0 1 2.9 1.9L19 17"></path>
        <path d="M7 14h.01"></path>
        <path d="M17 14h.01"></path>
    </symbol>
    <symbol id="icon-umbrella" viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 0 1 18 0Z"></path>
        <path d="M12 12v7a3 3 0 0 0 6 0"></path>
    </symbol>
    <symbol id="icon-plane" viewBox="0 0 24 24">
        <path d="M21 16v-2L3 7v3l7 4v5l3 1 2-4 4 2Z"></path>
    </symbol>
    <symbol id="icon-list-check" viewBox="0 0 24 24">
        <path d="m3 17 2 2 4-4"></path>
        <path d="M13 18h8"></path>
        <path d="m3 7 2 2 4-4"></path>
        <path d="M13 8h8"></path>
    </symbol>
    <symbol id="icon-calculator" viewBox="0 0 24 24">
        <rect x="5" y="2" width="14" height="20" rx="2"></rect>
        <path d="M8 6h8"></path>
        <path d="M8 10h.01"></path>
        <path d="M12 10h.01"></path>
        <path d="M16 10h.01"></path>
        <path d="M8 14h.01"></path>
        <path d="M12 14h.01"></path>
        <path d="M16 14h.01"></path>
        <path d="M8 18h.01"></path>
        <path d="M12 18h.01"></path>
        <path d="M16 18h.01"></path>
    </symbol>
    <symbol id="icon-user" viewBox="0 0 24 24">
        <path d="M20 21a8 8 0 0 0-16 0"></path>
        <circle cx="12" cy="7" r="4"></circle>
    </symbol>
    <symbol id="icon-coins" viewBox="0 0 24 24">
        <ellipse cx="8" cy="5" rx="5" ry="3"></ellipse>
        <path d="M3 5v6c0 1.7 2.2 3 5 3s5-1.3 5-3V5"></path>
        <path d="M16 8c2.9.3 5 1.5 5 3 0 1.7-2.2 3-5 3-1.1 0-2.1-.2-3-.6"></path>
        <path d="M21 11v6c0 1.7-2.2 3-5 3-1.1 0-2.1-.2-3-.6"></path>
    </symbol>
    <symbol id="icon-users" viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 21v-2a4 4 0 0 0-3-3.9"></path>
        <path d="M16 3.1a4 4 0 0 1 0 7.8"></path>
    </symbol>
    <symbol id="icon-bike" viewBox="0 0 24 24">
        <circle cx="5.5" cy="17.5" r="3.5"></circle>
        <circle cx="18.5" cy="17.5" r="3.5"></circle>
        <path d="M15 6h3l-3.5 6H9l3-6"></path>
        <path d="m5.5 17.5 4-5.5"></path>
        <path d="m14.5 12 4 5.5"></path>
    </symbol>
    <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path d="M8 2v4"></path>
        <path d="M16 2v4"></path>
        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
        <path d="M3 10h18"></path>
    </symbol>
    <symbol id="icon-receipt" viewBox="0 0 24 24">
        <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2Z"></path>
        <path d="M8 7h8"></path>
        <path d="M8 12h8"></path>
        <path d="M8 17h5"></path>
    </symbol>
</svg>
<div class="container">
    <h1><svg class="icon"><use href="#icon-shield"></use></svg>Insurance Premium Calculator</h1>

    <div class="box">
        <h2><svg class="icon"><use href="#icon-list-check"></use></svg>Select Insurance</h2>
        <div class="insurance-options">
            <div class="option" onclick="selectInsurance('health', this)">
                <svg class="icon option-icon"><use href="#icon-heart-pulse"></use></svg>
                <h3>Health Insurance</h3>
                <p>For medical expenses</p>
            </div>
            <div class="option" onclick="selectInsurance('vehicle', this)">
                <svg class="icon option-icon"><use href="#icon-car"></use></svg>
                <h3>Vehicle Insurance</h3>
                <p>For car or bike protection</p>
            </div>
            <div class="option" onclick="selectInsurance('life', this)">
                <svg class="icon option-icon"><use href="#icon-umbrella"></use></svg>
                <h3>Life Insurance</h3>
                <p>For family protection</p>
            </div>
            <div class="option" onclick="selectInsurance('travel', this)">
                <svg class="icon option-icon"><use href="#icon-plane"></use></svg>
                <h3>Travel Insurance</h3>
                <p>For trip protection</p>
            </div>
        </div>
    </div>

    <div id="detailsBox" class="box hidden">
        <h2 id="formTitle"><svg class="icon"><use href="#icon-list-check"></use></svg>Insurance Details</h2>

        <form id="insuranceForm">
            <div id="formFields"></div>
            <button type="submit"><svg class="icon"><use href="#icon-calculator"></use></svg>Calculate Premium</button>
        </form>
    </div>

    <div id="resultBox" class="box hidden">
        <h2><svg class="icon"><use href="#icon-receipt"></use></svg>Premium Details</h2>
        <div id="result" class="result"></div>
    </div>
</div>

<script>
    let selectedInsurance = "";

    const insuranceNames = {
        health: "Health Insurance",
        vehicle: "Vehicle Insurance",
        life: "Life Insurance",
        travel: "Travel Insurance"
    };

    function selectInsurance(type, selectedCard) {
        selectedInsurance = type;

        const options = document.querySelectorAll(".option");
        options.forEach(option => option.classList.remove("selected"));
        selectedCard.classList.add("selected");

        document.getElementById("detailsBox").classList.remove("hidden");
        document.getElementById("resultBox").classList.add("hidden");
        document.getElementById("formTitle").innerHTML = icon("list-check") + insuranceNames[type] + " Details";

        showFields(type);
    }

    function showFields(type) {
        let fields = "";

        if (type === "health") {
            fields = `
                <label>${icon("user")}Age</label>
                <input type="number" id="age" min="1" required>

                <label>${icon("coins")}Coverage Amount</label>
                <input type="number" id="coverage" min="10000" required>

                <label>${icon("users")}Number of Family Members</label>
                <input type="number" id="members" min="1" required>
            `;
        }

        if (type === "vehicle") {
            fields = `
                <label>${icon("car")}Vehicle Type</label>
                <select id="vehicleType" required>
                    <option value="bike">Bike</option>
                    <option value="car">Car</option>
                </select>

                <label>${icon("coins")}Vehicle Value</label>
                <input type="number" id="vehicleValue" min="10000" required>

                <label>${icon("calendar")}Vehicle Age in Years</label>
                <input type="number" id="vehicleAge" min="0" required>
            `;
        }

        if (type === "life") {
            fields = `
                <label>${icon("user")}Age</label>
                <input type="number" id="age" min="18" required>

                <label>${icon("coins")}Sum Assured</label>
                <input type="number" id="coverage" min="100000" required>

                <label>${icon("calendar")}Policy Term in Years</label>
                <input type="number" id="term" min="5" required>
            `;
        }

        if (type === "travel") {
            fields = `
                <label>${icon("coins")}Trip Cost</label>
                <input type="number" id="tripCost" min="1000" required>

                <label>${icon("calendar")}Number of Travel Days</label>
                <input type="number" id="days" min="1" required>

                <label>${icon("users")}Number of Travellers</label>
                <input type="number" id="travellers" min="1" required>
            `;
        }

        document.getElementById("formFields").innerHTML = fields;
    }

    document.getElementById("insuranceForm").addEventListener("submit", function (event) {
        event.preventDefault();
        sendDetailsToApi();
    });

    function icon(name) {
        return `<svg class="icon" aria-hidden="true"><use href="#icon-${name}"></use></svg>`;
    }

    async function sendDetailsToApi() {
        const requestData = collectFormData();

        const response = await fetch("/api/calculate-premium", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(requestData)
        });

        const result = await response.json();
        showResult(result);
    }

    function collectFormData() {
        const requestData = {
            insuranceType: selectedInsurance
        };

        if (selectedInsurance === "health") {
            requestData.age = Number(document.getElementById("age").value);
            requestData.coverage = Number(document.getElementById("coverage").value);
            requestData.members = Number(document.getElementById("members").value);
        }

        if (selectedInsurance === "vehicle") {
            requestData.vehicleType = document.getElementById("vehicleType").value;
            requestData.vehicleValue = Number(document.getElementById("vehicleValue").value);
            requestData.vehicleAge = Number(document.getElementById("vehicleAge").value);
        }

        if (selectedInsurance === "life") {
            requestData.age = Number(document.getElementById("age").value);
            requestData.coverage = Number(document.getElementById("coverage").value);
            requestData.term = Number(document.getElementById("term").value);
        }

        if (selectedInsurance === "travel") {
            requestData.tripCost = Number(document.getElementById("tripCost").value);
            requestData.days = Number(document.getElementById("days").value);
            requestData.travellers = Number(document.getElementById("travellers").value);
        }

        return requestData;
    }

    function showResult(result) {
        document.getElementById("resultBox").classList.remove("hidden");

        document.getElementById("result").innerHTML = `
            <table>
                <tr>
                    <th>Detail</th>
                    <th>Amount</th>
                </tr>
                <tr>
                    <td>Selected Insurance</td>
                    <td>${insuranceNames[selectedInsurance]}</td>
                </tr>
                <tr>
                    <td>Premium Amount</td>
                    <td>Rs. ${result.premium.toFixed(2)}</td>
                </tr>
                <tr>
                    <td>GST 18%</td>
                    <td>Rs. ${result.gst.toFixed(2)}</td>
                </tr>
                <tr>
                    <td>Total Amount</td>
                    <td>Rs. ${result.totalAmount.toFixed(2)}</td>
                </tr>
            </table>

            <h3>${icon("calendar")}EMI Options</h3>
            <table>
                <tr>
                    <th>Months</th>
                    <th>Monthly EMI</th>
                </tr>
                <tr>
                    <td>3 Months</td>
                    <td>Rs. ${result.emiOptions[3].toFixed(2)}</td>
                </tr>
                <tr>
                    <td>6 Months</td>
                    <td>Rs. ${result.emiOptions[6].toFixed(2)}</td>
                </tr>
                <tr>
                    <td>9 Months</td>
                    <td>Rs. ${result.emiOptions[9].toFixed(2)}</td>
                </tr>
                <tr>
                    <td>12 Months</td>
                    <td>Rs. ${result.emiOptions[12].toFixed(2)}</td>
                </tr>
            </table>
        `;
    }
</script>
</body>
</html>
